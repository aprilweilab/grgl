{% set name = "pygrgl" %}
{% set version = "2.10" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  path: ../../../

build:
  number: 0
  entry_points:
    - grg=pygrgl.cli:main
  script: "{{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv"
  run_exports:
    - {{ pin_subpackage('pygrgl', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - python
    - zlib
    - pip
    - tqdm
    - setuptools
  run:
    - python
    - tqdm

test:
  imports:
    - pygrgl
  commands:
    - grg --help

about:
  home: "https://aprilweilab.github.io/"
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: "Genotype Representation Graph Library for efficient storage/use of huge genetic datasets"
  doc_url: "https://grgl.readthedocs.io/en/stable/"
  dev_url: "https://github.com/aprilweilab/grgl"

extra:
  recipe-maintainers:
    - dcdehaas
